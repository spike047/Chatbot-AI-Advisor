<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- FIX: removed maximum-scale=1.0 / user-scalable=no — these break accessibility on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="AI-powered career advisor providing personalized career guidance and professional development insights">
    <title>CareerPath AI Advisor | Professional Career Guidance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');

        /* ─── Design Tokens (Light) ─────────────────────────────────────────────── */
        :root {
            --bg:               #f0f4ff;
            --card:             #ffffff;
            --text:             #1e293b;
            --text-muted:       #64748b;
            --user-bubble:      #3b82f6;
            --user-bubble-end:  #4f46e5;
            --bot-bubble:       #f1f5f9;
            --accent:           #6366f1;
            --accent-2:         #8b5cf6;
            --border:           #e2e8f0;
            --shadow:           rgba(0, 0, 0, 0.06);
            --shadow-hover:     rgba(0, 0, 0, 0.13);
            --input-border:     #cbd5e1;
            --success:          #10b981;
            --warning:          #f59e0b;
            --error:            #ef4444;
            --info:             #3b82f6;
            --code-bg:          #e8edf5;
            --code-text:        #334155;
            --header-border:    #e2e8f0;
            --modal-bg:         rgba(15, 23, 42, 0.55);
        }

        /* ─── Design Tokens (Dark) ───────────────────────────────────────────────── */
        body.dark {
            --bg:               #0f172a;
            --card:             #1e293b;
            --text:             #e2e8f0;
            --text-muted:       #94a3b8;
            --user-bubble:      #6366f1;
            --user-bubble-end:  #7c3aed;
            --bot-bubble:       #334155;
            --accent:           #818cf8;
            --accent-2:         #a78bfa;
            --border:           #334155;
            --shadow:           rgba(0, 0, 0, 0.3);
            --shadow-hover:     rgba(0, 0, 0, 0.45);
            --input-border:     #475569;
            --code-bg:          #0f172a;
            --code-text:        #e2e8f0;
            --header-border:    #334155;
        }

        /* ─── Reset & Base ───────────────────────────────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            /* FIX: use dvh (dynamic viewport height) with vh fallback so mobile browsers
                     account for the address-bar shrink properly */
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* FIX: replace fixed 1rem padding with safe-area-aware padding for notched phones */
            padding: env(safe-area-inset-top, 0.75rem) env(safe-area-inset-right, 0.75rem)
                     env(safe-area-inset-bottom, 0.75rem) env(safe-area-inset-left, 0.75rem);
            transition: background-color 0.35s ease, color 0.35s ease;
            opacity: 0;
            animation: pageFadeIn 0.6s forwards;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
        }

        @keyframes pageFadeIn {
            to { opacity: 1; }
        }

        /* ─── Chat Container ─────────────────────────────────────────────────────── */
        .chat-container {
            width: 100%;
            max-width: 820px;
            /* FIX: replaced fixed 80vh/900px with fluid clamp so it adapts to every
                     screen size without breaking layout */
            height: clamp(500px, 88vh, 920px);
            background: var(--card);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            /* FIX: removed the scale(1.05) hover — it caused overflow on small screens
                     and is distracting UX. Replaced with a gentle lift. */
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .chat-container:hover {
            box-shadow: 0 16px 48px var(--shadow-hover);
        }

        /* ─── Header ─────────────────────────────────────────────────────────────── */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--header-border);
            flex-shrink: 0;    /* FIX: prevent header from being crushed on small screens */
            gap: 0.5rem;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;      /* FIX: allow title text to truncate instead of overflowing */
        }

        .chat-title h2 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-title-icon {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: var(--accent);
            flex-shrink: 0;
        }

        /* ─── Header Controls ────────────────────────────────────────────────────── */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            border-radius: 50%;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
        }

        .icon-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .icon-btn.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent);
        }

        /* Dark-mode toggle is slightly larger for visual distinction */
        #toggle-dark {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px var(--shadow);
        }

        #toggle-dark:hover {
            transform: scale(1.08);
        }

        /* ─── Chat Box ───────────────────────────────────────────────────────────── */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0.75rem 0.25rem;
            margin: 0 -0.25rem;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            /* FIX: explicit min-height prevents collapse when content is short */
            min-height: 0;
        }

        /* Scrollbar */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
            opacity: 0.6;
        }
        #chat-box::-webkit-scrollbar-thumb:hover { opacity: 1; }

        /* ─── Welcome Message ────────────────────────────────────────────────────── */
        .welcome-message {
            text-align: center;
            padding: 1.1rem 1.25rem;
            background: rgba(99, 102, 241, 0.07);
            border-radius: 14px;
            border-left: 4px solid var(--accent);
            margin-bottom: 0.5rem;
        }

        .welcome-message h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: var(--accent);
        }

        .welcome-message p {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.55;
        }

        /* ─── Messages ───────────────────────────────────────────────────────────── */
        .message {
            /* FIX: clamp max-width so messages don't fill full width on huge screens
                     but also don't get too narrow on phones */
            max-width: min(82%, 620px);
            padding: 0.8rem 1.1rem;
            font-size: 0.9375rem;
            border-radius: 14px;
            line-height: 1.6;
            animation: msgIn 0.28s ease-out forwards;
            transform: translateY(8px);
            opacity: 0;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            position: relative;
        }

        @keyframes msgIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: linear-gradient(135deg, var(--user-bubble), var(--user-bubble-end));
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.25);
        }

        .bot {
            background: var(--bot-bubble);
            color: var(--text);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* ─── Message Meta & Actions ─────────────────────────────────────────────── */
        .message-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            margin-top: 0.4rem;
            opacity: 0.65;
            gap: 0.5rem;
        }

        .user .message-meta { color: rgba(255,255,255,0.85); }
        .bot .message-meta  { color: var(--text-muted); }

        .message-actions {
            display: flex;
            gap: 0.35rem;
            margin-top: 0.35rem;
            flex-wrap: wrap;
        }

        .message-action-btn {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.78rem;
            opacity: 0.6;
            transition: opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
            padding: 0.2rem 0.35rem;
            border-radius: 4px;
        }

        .message-action-btn:hover { opacity: 1; }

        /* ─── Typing Indicator ───────────────────────────────────────────────────── */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0.15rem 0;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            opacity: 0.45;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0);  opacity: 0.45; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }

        /* ─── Formatted Content ──────────────────────────────────────────────────── */
        .message p   { margin-bottom: 0.5em; }
        .message p:last-child { margin-bottom: 0; }

        .message ul,
        .message ol  {
            margin: 0.4em 0 0.6em 1.2em;
            padding: 0;
        }

        .message li  { margin-bottom: 0.2em; line-height: 1.55; }

        .message pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 0.7em 0.9em;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.82em;
            margin: 0.6em 0;
            /* FIX: white-space: pre-wrap so code doesn't blow out the bubble width */
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message code {
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.86em;
            background: rgba(99,102,241,0.08);
            padding: 0.15em 0.4em;
            border-radius: 4px;
        }

        .user .message code {
            background: rgba(255,255,255,0.2);
        }

        /* ─── Status Indicators ──────────────────────────────────────────────────── */
        .status-indicator {
            padding: 0.45rem 0.9rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            align-self: center;
        }

        .status-success { background: rgba(16,185,129,0.1);  color: var(--success); border-left: 3px solid var(--success); }
        .status-warning { background: rgba(245,158,11,0.1);  color: var(--warning); border-left: 3px solid var(--warning); }
        .status-error   { background: rgba(239,68,68,0.1);   color: var(--error);   border-left: 3px solid var(--error);   }
        .status-info    { background: rgba(59,130,246,0.1);  color: var(--info);    border-left: 3px solid var(--info);    }

        /* ─── Input Area ─────────────────────────────────────────────────────────── */
        .input-container {
            padding-top: 0.85rem;
            border-top: 1px solid var(--header-border);
            flex-shrink: 0;
            /* FIX: bottom safe-area padding for iPhones with home indicator */
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* Voice recording row */
        #voice-recording-ui {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.4rem 0 0.5rem;
            justify-content: center;
        }

        .voice-recording-indicator {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--error);
        }

        .recording-dot {
            width: 9px;
            height: 9px;
            background: var(--error);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.25; }
        }

        .recording-timer {
            font-family: monospace;
            font-size: 0.88rem;
            color: var(--text);
        }

        .voice-control-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.45rem;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-control-btn:hover      { background: rgba(99,102,241,0.1); color: var(--accent); }
        .voice-control-btn.stop       { color: var(--error); }
        .voice-control-btn.stop:hover { background: rgba(239,68,68,0.1); }

        /* Input row */
        .input-area {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        /* FIX: use <textarea> styles for the text input so long messages wrap properly;
                applied via class so we can target it without breaking other inputs */
        #user-input {
            flex: 1;
            min-width: 0;            /* FIX: prevents flex overflow on narrow screens */
            padding: 0.8rem 1.1rem;
            font-size: 0.9375rem;
            font-family: inherit;
            border-radius: 12px;
            border: 1.5px solid var(--input-border);
            outline: none;
            background: var(--card);
            color: var(--text);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            /* FIX: allow the field to grow slightly on mobile so thumb-typed messages
                     stay readable without horizontal scrolling */
            resize: none;
            overflow-y: hidden;
            line-height: 1.5;
            max-height: 120px;
        }

        #user-input::placeholder { color: var(--text-muted); opacity: 0.8; }

        #user-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
        }

        /* ─── Send Button ────────────────────────────────────────────────────────── */
        .send-btn {
            padding: 0.8rem 1.4rem;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            background: linear-gradient(135deg, var(--user-bubble), var(--user-bubble-end));
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: filter 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            box-shadow: 0 2px 10px rgba(79,70,229,0.28);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 5px 18px rgba(79,70,229,0.38);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(79,70,229,0.2);
        }

        /* FIX: disabled state when waiting for a response */
        .send-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .send-btn i { font-size: 0.95rem; }

        /* ─── Clear Button ───────────────────────────────────────────────────────── */
        .clear-btn {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            padding: 0;
            font-size: 1.15rem;
            background: var(--bot-bubble);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.25s, transform 0.2s, box-shadow 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            box-shadow: 0 1px 4px var(--shadow);
        }

        .clear-btn:hover {
            background: rgba(239,68,68,0.1);
            color: var(--error);
            border-color: var(--error);
            transform: scale(1.06);
            box-shadow: 0 4px 12px rgba(239,68,68,0.2);
        }

        .clear-btn:focus-visible {
            outline: 2px solid var(--error);
            outline-offset: 2px;
        }

        /* ─── Modal ──────────────────────────────────────────────────────────────── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--modal-bg);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        /* FIX: use display:flex when shown so modal-content centres reliably */
        .modal.open { display: flex; }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1.75rem 1.5rem;
            width: min(340px, 92vw);     /* FIX: modal fits small phones */
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
            animation: popIn 0.25s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-content p {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 1.25rem;
            line-height: 1.55;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-actions button {
            padding: 0.65rem 1.4rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            transition: filter 0.2s, transform 0.2s, box-shadow 0.2s;
        }

        .modal-actions button:hover {
            filter: brightness(1.12);
            transform: scale(1.04);
        }

        #confirmClear  { background: #e74c3c; color: #fff; }
        #cancelClear   { background: #3b82f6; color: #fff; }

        /* ─── Utility ────────────────────────────────────────────────────────────── */
        .hidden { display: none !important; }

        /* ─── Responsive: Tablet (≤ 768px) ──────────────────────────────────────── */
        @media (max-width: 768px) {
            body { padding: 0.5rem; }

            .chat-container {
                height: clamp(480px, 95vh, 860px);
                border-radius: 16px;
                padding: 1.1rem;
            }

            .chat-title h2 { font-size: 1.1rem; }

            .message {
                max-width: 90%;
                font-size: 0.9rem;
                padding: 0.7rem 0.95rem;
            }

            #user-input {
                padding: 0.7rem 0.9rem;
                font-size: 0.9rem;
            }

            .send-btn {
                padding: 0.7rem 1.1rem;
                font-size: 0.9rem;
            }

            .icon-btn {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }
        }

        /* ─── Responsive: Mobile (≤ 480px) ──────────────────────────────────────── */
        @media (max-width: 480px) {
            body { padding: 0; }

            .chat-container {
                /* FIX: on very small phones, go full-screen instead of a fixed 550×380 box */
                height: 100vh;
                height: 100dvh;
                width: 100%;
                border-radius: 0;
                padding: 0.85rem 0.85rem 0;
            }

            .chat-title h2 { font-size: 0.95rem; }

            .message {
                max-width: 93%;
                font-size: 0.875rem;
                padding: 0.65rem 0.85rem;
            }

            /* Hide "Send" label on very small screens — icon is enough */
            .send-btn .btn-label { display: none; }

            .send-btn {
                padding: 0.7rem 0.85rem;
            }

            .welcome-message {
                padding: 0.75rem 0.9rem;
            }

            .icon-btn {
                width: 32px;
                height: 32px;
                font-size: 0.875rem;
            }

            .header-controls { gap: 0.25rem; }
        }

        /* ─── Responsive: Large Screens (≥ 1200px) ──────────────────────────────── */
        @media (min-width: 1200px) {
            .chat-container {
                /* Give more breathing room on desktop */
                padding: 1.75rem 2rem;
            }
        }

        /* ─── Reduced Motion ─────────────────────────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="chat-container" role="main">

        <!-- ── Header ── -->
        <header class="chat-header">
            <div class="chat-title">
                <i class="fas fa-graduation-cap chat-title-icon" aria-hidden="true"></i>
                <h2>CareerPath AI Advisor</h2>
            </div>
            <div class="header-controls" role="toolbar" aria-label="Chat controls">
                <button class="icon-btn" id="toggle-tts"
                        title="Toggle Text-to-Speech"
                        aria-label="Toggle Text-to-Speech"
                        aria-pressed="false">
                    <i class="fas fa-volume-mute" aria-hidden="true"></i>
                </button>
                <button class="icon-btn" id="toggle-voice"
                        title="Voice Input"
                        aria-label="Start voice input"
                        aria-pressed="false">
                    <i class="fas fa-microphone" aria-hidden="true"></i>
                </button>
                <button class="icon-btn" id="toggle-dark"
                        title="Toggle Dark Mode"
                        aria-label="Toggle dark mode"
                        aria-pressed="false">
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </button>
            </div>
        </header>

        <!-- ── Chat Box ── -->
        <div id="chat-box" role="log" aria-live="polite" aria-label="Chat messages">
            <div class="welcome-message" role="status">
                <h3>Welcome to CareerPath AI Advisor</h3>
                <p>I'm here to help with career guidance, job search strategies, and professional development advice.
                    How can I assist you today?</p>
            </div>
        </div>

        <!-- ── Input Area ── -->
        <div class="input-container">
            <!-- Voice recording indicator (hidden by default) -->
            <div id="voice-recording-ui" class="hidden" role="status" aria-live="assertive">
                <div class="voice-recording-indicator" aria-label="Recording in progress">
                    <div class="recording-dot" aria-hidden="true"></div>
                    <span class="recording-timer" id="recording-timer">00:00</span>
                </div>
                <div>
                    <button class="voice-control-btn stop" id="stop-recording"
                            title="Stop recording" aria-label="Stop voice recording">
                        <i class="fas fa-stop" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div class="input-area">
                <!-- FIX: changed to textarea for multi-line support; styled to look like an input -->
                <textarea
                    id="user-input"
                    placeholder="Ask about careers, jobs, or skills…"
                    autocomplete="off"
                    autocorrect="on"
                    spellcheck="true"
                    rows="1"
                    aria-label="Type your message"
                    aria-multiline="true"
                ></textarea>

                <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">
                    <i class="fas fa-paper-plane" aria-hidden="true"></i>
                    <span class="btn-label">Send</span>
                </button>

                <!-- FIX: replaced <h6> (semantic heading) with a proper <button> -->
                <button class="clear-btn" id="clear-btn"
                        onclick="confirmClear()"
                        title="Clear chat"
                        aria-label="Clear chat history">
                    <i class="fas fa-trash-alt" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Clear-Chat Modal ── -->
    <!-- FIX: moved outside .chat-container so it overlays the whole page -->
    <div id="clearModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-message">
        <div class="modal-content">
            <p id="modal-message">Are you sure you want to clear the chat history? This cannot be undone.</p>
            <div class="modal-actions">
                <button id="confirmClear" aria-label="Confirm clear chat">Yes, clear</button>
                <button id="cancelClear"  aria-label="Cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Sound effects (preload silently) -->
    <audio id="notification-sound"   src="https://assets.mixkit.co/sfx/preview/mixkit-positive-interface-beep-221.mp3"    preload="none"></audio>
    <audio id="send-sound"           src="https://assets.mixkit.co/sfx/preview/mixkit-modern-click-tech-1109.mp3"         preload="none"></audio>
    <audio id="start-recording-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-modern-interface-bleep-2148.mp3"   preload="none"></audio>
    <audio id="stop-recording-sound"  src="https://assets.mixkit.co/sfx/preview/mixkit-modern-interface-bleep-2149.mp3"   preload="none"></audio>

    <script>
        "use strict";

        // ─── DOM References ───────────────────────────────────────────────────────
        const chatBox          = document.getElementById("chat-box");
        const inputEl          = document.getElementById("user-input");
        const sendBtn          = document.getElementById("send-btn");
        const toggleBtn        = document.getElementById("toggle-dark");
        const toggleTtsBtn     = document.getElementById("toggle-tts");
        const toggleVoiceBtn   = document.getElementById("toggle-voice");
        const voiceRecordingUI = document.getElementById("voice-recording-ui");
        const stopRecordingBtn = document.getElementById("stop-recording");
        const recordingTimerEl = document.getElementById("recording-timer");

        const notificationSound    = document.getElementById("notification-sound");
        const sendSound            = document.getElementById("send-sound");
        const startRecordingSound  = document.getElementById("start-recording-sound");
        const stopRecordingSound   = document.getElementById("stop-recording-sound");

        // ─── Speech Synthesis ─────────────────────────────────────────────────────
        const synth = window.speechSynthesis;
        let ttsEnabled       = false;
        let currentUtterance = null;

        // ─── Voice Recognition ────────────────────────────────────────────────────
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition          = null;
        let isRecording          = false;
        let recordingStartTime   = 0;
        let recordingTimerInterval = null;

        // ─── State ────────────────────────────────────────────────────────────────
        let isBusy = false;   // FIX: prevent double-sends while waiting for API

        let conversationHistory = [
            {
                role: "system",
                content: "You are CareerPath AI, a professional career advisor. Provide thoughtful, personalized career guidance. Be concise but thorough. Format responses with clear paragraphs, bullet points, and numbered lists when appropriate. Always maintain a professional yet approachable tone. If asked about non-career topics, politely redirect to career-related discussions."
            }
        ];

        // ─── Init ─────────────────────────────────────────────────────────────────
        function init() {
            loadPreferences();
            setupEventListeners();
            inputEl.focus();
        }

        // ─── Load Preferences ─────────────────────────────────────────────────────
        function loadPreferences() {
            const isDark = localStorage.getItem("dark-mode") === "true";
            if (isDark) {
                document.body.classList.add("dark");
                toggleBtn.innerHTML    = '<i class="fas fa-sun" aria-hidden="true"></i>';
                toggleBtn.setAttribute("aria-pressed", "true");
            }

            const ttsPref = localStorage.getItem("tts-enabled");
            ttsEnabled = ttsPref === "true";
            updateTtsButton();

            // Voice recognition setup
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous     = false;
                recognition.interimResults = false;
                recognition.lang           = "en-US";

                recognition.onstart = () => {
                    inputEl.placeholder = "Listening…";
                    toggleVoiceBtn.classList.add("active");
                    toggleVoiceBtn.setAttribute("aria-pressed", "true");
                    playSound(startRecordingSound);
                };

                recognition.onresult = (event) => {
                    inputEl.value = event.results[0][0].transcript;
                    // FIX: auto-resize textarea after voice fill
                    autoResizeTextarea();
                    stopRecording();
                };

                recognition.onend = () => {
                    isRecording = false;
                    voiceRecordingUI.classList.add("hidden");
                    clearInterval(recordingTimerInterval);
                    toggleVoiceBtn.classList.remove("active");
                    toggleVoiceBtn.setAttribute("aria-pressed", "false");
                    inputEl.placeholder = "Ask about careers, jobs, or skills…";
                    inputEl.focus();
                    playSound(stopRecordingSound);
                };

                recognition.onerror = (event) => {
                    console.error("Speech recognition error:", event.error);
                    stopRecording();
                    if (event.error !== "aborted") {
                        appendStatus(`Voice input error: ${event.error}`, "error");
                    }
                };
            } else {
                toggleVoiceBtn.disabled = true;
                toggleVoiceBtn.title    = "Voice input not supported in this browser";
                toggleVoiceBtn.style.cssText = "opacity:.4;cursor:not-allowed";
            }
        }

        // ─── Event Listeners ──────────────────────────────────────────────────────
        function setupEventListeners() {
            toggleBtn.addEventListener("click",      toggleDarkMode);
            toggleTtsBtn.addEventListener("click",   toggleTts);
            toggleVoiceBtn.addEventListener("click", toggleVoiceInput);
            stopRecordingBtn.addEventListener("click", stopRecording);

            // FIX: Enter sends, Shift+Enter adds a newline (natural behaviour for textarea)
            inputEl.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // FIX: auto-grow the textarea as the user types
            inputEl.addEventListener("input", autoResizeTextarea);

            // Modal buttons
            document.getElementById("confirmClear").addEventListener("click", () => {
                closeModal();
                clearChat();
                playSound(notificationSound);
            });

            document.getElementById("cancelClear").addEventListener("click", closeModal);

            // FIX: clicking the modal backdrop also closes it
            document.getElementById("clearModal").addEventListener("click", (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            // FIX: Escape key closes the modal
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });
        }

        // ─── Textarea Auto-resize ─────────────────────────────────────────────────
        function autoResizeTextarea() {
            inputEl.style.height = "auto";
            inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
        }

        // ─── Dark Mode ────────────────────────────────────────────────────────────
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle("dark");
            localStorage.setItem("dark-mode", isDark);
            toggleBtn.innerHTML = isDark
                ? '<i class="fas fa-sun" aria-hidden="true"></i>'
                : '<i class="fas fa-moon" aria-hidden="true"></i>';
            toggleBtn.setAttribute("aria-pressed", String(isDark));
            playSound(notificationSound);
        }

        // ─── TTS ──────────────────────────────────────────────────────────────────
        function toggleTts() {
            ttsEnabled = !ttsEnabled;
            localStorage.setItem("tts-enabled", ttsEnabled);
            updateTtsButton();
            playSound(notificationSound);
            if (!ttsEnabled && synth.speaking) synth.cancel();
        }

        function updateTtsButton() {
            toggleTtsBtn.classList.toggle("active", ttsEnabled);
            toggleTtsBtn.setAttribute("aria-pressed", String(ttsEnabled));
            toggleTtsBtn.innerHTML = ttsEnabled
                ? '<i class="fas fa-volume-up" aria-hidden="true"></i>'
                : '<i class="fas fa-volume-mute" aria-hidden="true"></i>';
            toggleTtsBtn.title = ttsEnabled ? "Disable Text-to-Speech" : "Enable Text-to-Speech";
        }

        function speak(text) {
            if (!ttsEnabled) return;
            if (synth.speaking) synth.cancel();

            // Strip HTML tags before speaking
            const plainText = text.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
            if (!plainText) return;

            currentUtterance       = new SpeechSynthesisUtterance(plainText);
            currentUtterance.lang  = "en-US";
            currentUtterance.rate  = 1.0;
            currentUtterance.pitch = 1.0;

            const voices = synth.getVoices();
            const preferred = voices.find(v =>
                v.name.includes("Google US English") || v.name.includes("Microsoft Zira") || v.default
            );
            if (preferred) currentUtterance.voice = preferred;

            currentUtterance.onend   = () => { currentUtterance = null; };
            currentUtterance.onerror = (e) => {
                console.error("TTS error:", e);
                // FIX: only surface non-interrupted errors to avoid noise
                if (e.error !== "interrupted") {
                    appendStatus(`TTS error: ${e.error}`, "error");
                }
            };

            synth.speak(currentUtterance);
        }

        function speakMessage(btn) {
            // FIX: use innerText on the content div (first child) to avoid reading HTML tags
            const msgEl = btn.closest(".message");
            if (!msgEl) return;
            const contentEl = msgEl.querySelector(".msg-content");
            speak(contentEl ? contentEl.innerText : msgEl.innerText);
        }

        // ─── Voice Input ──────────────────────────────────────────────────────────
        function toggleVoiceInput() {
            if (!recognition) {
                appendStatus("Voice input is not supported in your browser.", "error");
                return;
            }
            isRecording ? stopRecording() : startRecording();
        }

        function startRecording() {
            if (!recognition) return;
            try {
                recognition.start();
                isRecording       = true;
                recordingStartTime = Date.now();
                voiceRecordingUI.classList.remove("hidden");
                updateRecordingTimer();
                recordingTimerInterval = setInterval(updateRecordingTimer, 1000);
            } catch (err) {
                console.error("Error starting voice recognition:", err);
                appendStatus("Could not start voice input. Check microphone permissions.", "error");
                stopRecording();
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            recognition && recognition.stop();
            // onend handler cleans up state
        }

        function updateRecordingTimer() {
            const total   = Math.floor((Date.now() - recordingStartTime) / 1000);
            const mins    = Math.floor(total / 60).toString().padStart(2, "0");
            const secs    = (total % 60).toString().padStart(2, "0");
            recordingTimerEl.textContent = `${mins}:${secs}`;
        }

        // ─── Sound Effects ────────────────────────────────────────────────────────
        function playSound(audioEl) {
            try {
                audioEl.currentTime = 0;
                audioEl.play().catch(() => {});  // FIX: silent catch — autoplay may be blocked
            } catch (_) {}
        }

        // ─── Modal ────────────────────────────────────────────────────────────────
        function confirmClear() {
            document.getElementById("clearModal").classList.add("open");
        }

        function closeModal() {
            document.getElementById("clearModal").classList.remove("open");
        }

        // ─── Clear Chat ───────────────────────────────────────────────────────────
        function clearChat() {
            conversationHistory = [
                {
                    role: "system",
                    content: "You are CareerPath AI, a professional career advisor. Provide thoughtful, personalized career guidance. Be concise but thorough. Format responses with clear paragraphs, bullet points, and numbered lists when appropriate. Always maintain a professional yet approachable tone. If asked about non-career topics, politely redirect to career-related discussions."
                }
            ];
            chatBox.innerHTML = `
                <div class="welcome-message" role="status">
                    <h3>Chat cleared</h3>
                    <p>Start a new conversation below. How can I help you today?</p>
                </div>`;
        }

        // ─── Format Message Text ─────────────────────────────────────────────────
        function formatMessageText(text) {
            // 1. Extract fenced code blocks to protect them from inline processing
            const codeBlocks = [];
            text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
                codeBlocks.push(`<pre><code>${escapeHtml(code.trim())}</code></pre>`);
                return `\x00CB${codeBlocks.length - 1}\x00`;
            });

            // 2. Extract inline code
            const inlineCodes = [];
            text = text.replace(/`([^`]+)`/g, (_, code) => {
                inlineCodes.push(`<code>${escapeHtml(code)}</code>`);
                return `\x00IC${inlineCodes.length - 1}\x00`;
            });

            // 3. Bold and italic
            text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
            text = text.replace(/\*\*(.+?)\*\*/g,     "<strong>$1</strong>");
            text = text.replace(/\*(.+?)\*/g,          "<em>$1</em>");

            // 4. Process lines → list items
            const lines = text.split("\n");
            const out   = [];
            let listStack = []; // stack of "ul" | "ol"

            for (const raw of lines) {
                const line    = raw.trimEnd();
                const trimmed = line.trimStart();

                const bulletMatch  = trimmed.match(/^[-*]\s+(.+)/);
                const numberedMatch = trimmed.match(/^\d+\.\s+(.+)/);

                if (bulletMatch || numberedMatch) {
                    const type     = numberedMatch ? "ol" : "ul";
                    const content  = (bulletMatch || numberedMatch)[1];
                    const top      = listStack[listStack.length - 1];

                    if (top !== type) {
                        if (top) out.push(`</${listStack.pop()}>`);
                        out.push(`<${type}>`);
                        listStack.push(type);
                    }
                    out.push(`<li>${content}</li>`);
                } else {
                    // Close open lists
                    while (listStack.length) out.push(`</${listStack.pop()}>`);
                    out.push(line);
                }
            }
            while (listStack.length) out.push(`</${listStack.pop()}>`);

            text = out.join("\n");

            // 5. Paragraphs — wrap double-newline-separated blocks
            text = text
                .split(/\n{2,}/)
                .map(block => {
                    const b = block.trim();
                    if (!b) return "";
                    if (/^<(ul|ol|pre|li)/.test(b) || b.startsWith("\x00CB")) return b;
                    return `<p>${b.replace(/\n/g, "<br>")}</p>`;
                })
                .join("");

            // 6. Restore extracted blocks
            text = text.replace(/\x00CB(\d+)\x00/g, (_, i) => codeBlocks[+i]);
            text = text.replace(/\x00IC(\d+)\x00/g, (_, i) => inlineCodes[+i]);

            return text;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ─── Append Message ───────────────────────────────────────────────────────
        function appendMessage(sender, text, isThinking = false) {
            const msg = document.createElement("div");
            msg.className = `message ${sender}`;

            if (isThinking) {
                msg.setAttribute("aria-label", "Career Advisor is typing");
                msg.innerHTML = `
                    <div class="typing-indicator" aria-hidden="true">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>`;
            } else {
                const formatted  = formatMessageText(text);
                const timestamp  = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                const senderName = sender === "user" ? "You" : "Career Advisor";

                msg.innerHTML = `
                    <div class="msg-content">${formatted}</div>
                    <div class="message-meta">
                        <span>${senderName}</span>
                        <span>${timestamp}</span>
                    </div>
                    ${sender === "bot" ? `
                    <div class="message-actions">
                        <button class="message-action-btn" onclick="speakMessage(this)" title="Read aloud" aria-label="Read this message aloud">
                            <i class="fas fa-volume-up" aria-hidden="true"></i> Hear this
                        </button>
                    </div>` : ""}`;
            }

            chatBox.appendChild(msg);
            // FIX: use requestAnimationFrame to ensure DOM paint before scrolling
            requestAnimationFrame(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            });

            return msg;
        }

        // ─── Append Status ────────────────────────────────────────────────────────
        function appendStatus(text, type = "info") {
            const iconMap = { success: "check-circle", warning: "exclamation-triangle", error: "times-circle", info: "info-circle" };
            const el = document.createElement("div");
            el.className = `status-indicator status-${type}`;
            el.setAttribute("role", "alert");
            el.innerHTML = `<i class="fas fa-${iconMap[type] || "info-circle"}" aria-hidden="true"></i><span>${escapeHtml(text)}</span>`;
            chatBox.appendChild(el);
            requestAnimationFrame(() => { chatBox.scrollTop = chatBox.scrollHeight; });
        }

        // ─── API Call ─────────────────────────────────────────────────────────────
        async function getBotResponse(userInput) {
            conversationHistory.push({ role: "user", content: userInput });

            const response = await fetch("/api/chat", {
                method:  "POST",
                headers: { "Content-Type": "application/json" },
                body:    JSON.stringify({ messages: conversationHistory }),
                // FIX: abort after 60 s to prevent the UI hanging indefinitely
                signal:  AbortSignal.timeout(60_000),
            });

            const raw = await response.text();
            let data = {};
            try { data = raw ? JSON.parse(raw) : {}; } catch { /* ignore */ }

            if (!response.ok) {
                // FIX: roll back the user message we just pushed so a retry doesn't duplicate it
                conversationHistory.pop();
                throw new Error(data.error || `Server error ${response.status}`);
            }

            const botMessage = data.reply || "No response received. Please try again.";
            conversationHistory.push({ role: "assistant", content: botMessage });
            return botMessage;
        }

        // ─── Send Message ─────────────────────────────────────────────────────────
        async function sendMessage() {
            const userInput = inputEl.value.trim();
            if (!userInput || isBusy) return;

            // FIX: lock UI while waiting so the user can't fire duplicate requests
            isBusy = true;
            sendBtn.disabled = true;

            playSound(sendSound);
            appendMessage("user", userInput);

            // Reset textarea
            inputEl.value = "";
            inputEl.style.height = "auto";

            // Typing indicator
            const thinkingMsg = appendMessage("bot", "", true);

            let botReply;
            try {
                botReply = await getBotResponse(userInput);
            } catch (err) {
                console.error("getBotResponse failed:", err);
                botReply = err.name === "TimeoutError"
                    ? "The request timed out. Please check your connection and try again."
                    : (err.message || "Something went wrong. Please try again.");
            } finally {
                thinkingMsg.remove();
                isBusy = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }

            appendMessage("bot", botReply);

            if (ttsEnabled) speak(botReply);
        }

        // ─── Boot ─────────────────────────────────────────────────────────────────
        window.addEventListener("DOMContentLoaded", init);
    </script>
</body>

</html>
